// ─── Utility Components ───

function Badge({ color, children }) {
  const colors = {
    green: 'bg-kgreen-light text-kgreen',
    yellow: 'bg-kyellow-bg text-kyellow',
    red: 'bg-kred-bg text-kred',
    purple: 'bg-kpurple-bg text-kpurple',
    gray: 'bg-kgray-100 text-kgray-600',
    blue: 'bg-kblue-light text-kblue',
  };
  return (
    <span className={`px-2 py-0.5 rounded-full text-[10px] font-semibold uppercase tracking-wide ${colors[color] || colors.gray}`}>
      {children}
    </span>
  );
}

function StatusBadge({ status }) {
  const map = {
    running: { color: 'green', label: 'Running', dot: '●' },
    sleeping: { color: 'yellow', label: 'Sleeping', dot: '●' },
    stopped: { color: 'red', label: 'Stopped', dot: '●' },
    deploying: { color: 'purple', label: 'Deploying', dot: '◌' },
  };
  const s = map[status] || map.stopped;
  return <Badge color={s.color}>{s.dot} {s.label}</Badge>;
}

function FrameworkBadge({ framework }) {
  const map = { Streamlit: 'blue', JavaScript: 'purple', Docker: 'gray' };
  return <Badge color={map[framework] || 'gray'}>{framework}</Badge>;
}

function Sparkline({ data }) {
  const max = Math.max(...data, 1);
  return (
    <div className="inline-flex items-end gap-[2px] h-5">
      {data.map((v, i) => <span key={i} className="sparkline-bar w-[3px]" style={{ height: `${(v / max) * 100}%` }} />)}
    </div>
  );
}

function StatCard({ label, value, sub, subColor }) {
  return (
    <div className="bg-white rounded-lg p-4 border border-kborder shadow-sm">
      <div className="text-[11px] text-kgray-500 uppercase tracking-wider font-medium mb-1">{label}</div>
      <div className="text-[22px] font-bold text-ktext">{value}</div>
      {sub && <div className={`text-[11px] mt-0.5 ${subColor || 'text-kgray-500'}`}>{sub}</div>}
    </div>
  );
}

function Btn({ variant = 'outline', size = 'md', onClick, children, className = '', disabled }) {
  const base = 'rounded-lg font-semibold cursor-pointer border-none transition-all inline-flex items-center gap-1.5';
  const sizes = { sm: 'px-2.5 py-1 text-[11px]', md: 'px-4 py-[7px] text-[12px]', lg: 'px-5 py-2.5 text-[13px]' };
  const variants = {
    primary: 'bg-kgreen text-white hover:bg-kgreen-hover shadow-sm',
    secondary: 'bg-kblue text-white hover:bg-kblue-hover shadow-sm',
    outline: 'bg-white text-ktext border border-kborder hover:bg-kgray-100',
    ghost: 'bg-transparent text-kblue hover:bg-kblue-light',
    danger: 'bg-white text-kred border border-kred-bg hover:bg-kred-bg',
  };
  return (
    <button className={`${base} ${sizes[size]} ${variants[variant]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`} onClick={disabled ? undefined : onClick}>
      {children}
    </button>
  );
}

function Tab({ tabs, active, onChange }) {
  return (
    <div className="flex gap-0 border-b-2 border-kgray-200 mb-5">
      {tabs.map(t => (
        <div key={t} onClick={() => onChange(t)} className={`px-4 py-2 text-[12px] font-semibold cursor-pointer border-b-2 -mb-[2px] transition-all ${active === t ? 'text-kblue border-kblue' : 'text-kgray-500 border-transparent hover:text-ktext'}`}>
          {t}
        </div>
      ))}
    </div>
  );
}

function BuilderScreen({ onNavigate }) {
  const [messages, setMessages] = useState([]);
  const [step, setStep] = useState(0);
  const [selectedTable, setSelectedTable] = useState(null);
  const [columnMappingConfirmed, setColumnMappingConfirmed] = useState(false);
  const [previewReady, setPreviewReady] = useState(false);
  const chatEndRef = useRef(null);

  const tables = [
    { key: 'sales_kpis', label: 'out.c-sales.kpis', desc: '45,230 rows · Updated 15 min ago', columns: ['date', 'region', 'amount', 'deals_count', 'pipeline_value', 'rep_name'], bucket: 'out.c-sales' },
    { key: 'monthly_targets', label: 'out.c-sales.targets', desc: '120 rows · Updated 1d ago', columns: ['month', 'region', 'target_amount', 'target_deals'], bucket: 'out.c-sales' },
    { key: 'crm_deals', label: 'out.c-crm.deals', desc: '8,412 rows · Updated 2h ago', columns: ['deal_id', 'stage', 'value', 'close_date', 'owner'], bucket: 'out.c-crm' },
  ];

  const columnMapping = [
    { column: 'amount', role: 'KPI — Revenue', icon: '💰' },
    { column: 'deals_count', role: 'KPI — Deals Closed', icon: '🎯' },
    { column: 'pipeline_value', role: 'KPI — Pipeline', icon: '📈' },
    { column: 'region', role: 'Breakdown dimension', icon: '🌍' },
    { column: 'date', role: 'Time series axis', icon: '📅' },
    { column: 'rep_name', role: 'Top performers table', icon: '👤' },
  ];

  useEffect(() => {
    // Step 0: show user message
    setTimeout(() => {
      setMessages([{ type: 'user', text: 'Build me a sales dashboard that shows revenue by region from my sales data' }]);
      setStep(1);
    }, 300);
  }, []);

  useEffect(() => {
    if (step === 1) {
      // Step 1: KAI scans project, then shows table suggestions
      setTimeout(() => {
        setMessages(prev => [...prev, { type: 'typing' }]);
      }, 600);
      setTimeout(() => {
        setMessages(prev => prev.filter(m => m.type !== 'typing').concat([{
          type: 'kai',
          text: 'I scanned your Keboola project and found 3 tables that match "sales". Which should I use for your dashboard?',
          tableOptions: tables,
        }]));
        setStep(2);
      }, 2200);
    }
  }, [step]);

  useEffect(() => {
    if (step === 3) {
      // After table selection — KAI shows column mapping
      setTimeout(() => {
        setMessages(prev => [...prev, { type: 'typing' }]);
      }, 400);
      setTimeout(() => {
        setMessages(prev => prev.filter(m => m.type !== 'typing').concat([{
          type: 'kai',
          text: 'I read the schema of out.c-sales.kpis (45,230 rows, 6 columns). Here\'s how I\'ll map the columns to your dashboard:',
          columnMapping: columnMapping,
        }]));
        setStep(4);
      }, 1800);
    }
  }, [step]);

  useEffect(() => {
    if (step === 5) {
      // After column mapping confirmed — build
      setTimeout(() => {
        setMessages(prev => [...prev, { type: 'typing' }]);
      }, 300);
      setTimeout(() => {
        setMessages(prev => prev.filter(m => m.type !== 'typing').concat([{
          type: 'kai',
          text: 'Building your dashboard... Querying out.c-sales.kpis for the latest data and generating the UI.',
        }]));
      }, 1200);
      setTimeout(() => {
        setPreviewReady(true);
        setMessages(prev => [...prev, {
          type: 'kai',
          text: 'Your app is live with real data from out.c-sales.kpis! The KPIs show aggregated amount, deals_count, and pipeline_value. You can iterate by describing changes, or deploy when ready.',
        }]);
        setStep(6);
      }, 3500);
    }
  }, [step]);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  const handleSelectTable = (key) => {
    setSelectedTable(key);
    const table = tables.find(t => t.key === key);
    setMessages(prev => prev.map(m =>
      m.tableOptions ? { ...m, selectedOption: key } : m
    ).concat([{ type: 'user', text: `Use ${table.label}` }]));
    setStep(3);
  };

  const handleConfirmMapping = () => {
    setColumnMappingConfirmed(true);
    setMessages(prev => prev.map(m =>
      m.columnMapping ? { ...m, confirmed: true } : m
    ).concat([{ type: 'user', text: 'Looks good, build it!' }]));
    setStep(5);
  };

  return (
    <div className="screen-enter flex h-full">
      {/* Chat panel */}

        <div className="px-4 py-3 border-b border-kborder flex items-center gap-2">

          <span className="text-[13px] font-bold text-ktext">KAI Assistant</span>
          <span className="text-[10px] text-kgray-500 ml-auto">Powered by Keboola AI</span>
        </div>
        <div className="flex-1 overflow-y-auto p-4 space-y-3">
          {messages.map((msg, i) => {
            if (msg.type === 'typing') {
              return (
                <div key={i} className="flex items-center gap-2 msg-enter">
                  <div className="w-7 h-7 bg-gradient-to-br from-kpurple to-kblue rounded-md flex items-center justify-center text-[10px]">🤖</div>
                  <div className="flex gap-1 px-3 py-2 bg-kgray-100 rounded-xl">
                    <span className="typing-dot" /><span className="typing-dot" /><span className="typing-dot" />
                  </div>
                </div>
              );
            }
            if (msg.type === 'user') {
              return (
                <div key={i} className="flex justify-end msg-enter" style={{ animationDelay: `${i * 0.1}s` }}>
                  <div className="bg-kblue-light text-ktext rounded-2xl rounded-br-sm px-4 py-2.5 max-w-[85%] text-[12px] leading-relaxed">{msg.text}</div>
                </div>
              );
            }
            // KAI message
            return (
              <div key={i} className="flex gap-2 msg-enter" style={{ animationDelay: `${i * 0.1}s` }}>
                <div className="w-7 h-7 bg-gradient-to-br from-kpurple to-kblue rounded-md flex items-center justify-center text-[10px] flex-shrink-0 mt-0.5">🤖</div>
                <div className="flex-1">
                  <div className="bg-white border border-kborder rounded-2xl rounded-bl-sm px-4 py-2.5 text-[12px] leading-relaxed text-kgray-700">
                    {msg.text}
                  </div>
                  {msg.tableOptions && (
                    <div className="flex flex-col gap-2 mt-2.5">
                      {msg.tableOptions.map(opt => (
                        <div
                          key={opt.key}
                          onClick={() => !msg.selectedOption && handleSelectTable(opt.key)}
                          className={`rounded-lg text-[11px] transition-all overflow-hidden ${
                            msg.selectedOption === opt.key
                              ? 'bg-kblue-light border-2 border-kblue'
                              : msg.selectedOption
                              ? 'bg-kgray-100 border border-kgray-200 opacity-50 cursor-default'
                              : 'bg-white border border-kborder hover:border-kblue hover:shadow-sm cursor-pointer'
                          }`}
                        >

                                }`}>{col}</span>
                              ))}
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  )}
                  {msg.columnMapping && (
                    <div className="mt-2.5">
                      <div className="bg-white border border-kborder rounded-lg overflow-hidden">
                        {msg.columnMapping.map((cm, ci) => (
                          <div key={ci} className={`flex items-center gap-2.5 px-3 py-2 text-[11px] ${ci < msg.columnMapping.length - 1 ? 'border-b border-kgray-200' : ''}`}>

                      {!msg.confirmed && (

                        </div>
                      )}
                      {msg.confirmed && (
                        <div className="mt-1.5 text-[10px] text-kgreen font-semibold">✓ Mapping confirmed</div>
                      )}
                    </div>
                  )}
                </div>
              </div>
            );
          })}
          <div ref={chatEndRef} />

                const v=[35,42,38,55,62,58,72,80,75,90,95,88][i];
                return <div key={m} className="flex-1 flex flex-col items-center"><div className="w-full bg-kblue rounded-t" style={{height:`${v}%`,opacity:.5+(v/200)}}/><div className="text-[10px] text-kgray-500 mt-2">{m}</div></div>;
              })}
            </div>
          </div>
          <div className="grid grid-cols-2 gap-4 mt-4">
            <div className="bg-white rounded-lg p-5 border border-kborder">
              <div className="text-[11px] text-kgray-500 uppercase tracking-wider font-semibold mb-3">Top Performers</div>
              {['Sarah Chen — $420K','Mike Johnson — $380K','Lisa Park — $340K','Tom Wilson — $290K'].map((p,i) => (
                <div key={i} className="flex justify-between py-2 border-b border-kgray-200 text-[12px]"><span>{i+1}. {p.split(' — ')[0]}</span><span className="font-semibold">{p.split(' — ')[1]}</span></div>
              ))}
            </div>
            <div className="bg-white rounded-lg p-5 border border-kborder">
              <div className="text-[11px] text-kgray-500 uppercase tracking-wider font-semibold mb-3">Pipeline by Stage</div>
              {[{s:'Qualified',v:'$1.8M',p:35},{s:'Proposal',v:'$1.4M',p:27},{s:'Negotiation',v:'$1.1M',p:22},{s:'Closing',v:'$0.8M',p:16}].map((s,i) => (
                <div key={i} className="mb-2"><div className="flex justify-between text-[12px] mb-1"><span>{s.s}</span><span className="font-semibold">{s.v}</span></div><div className="h-1.5 bg-kgray-200 rounded-full overflow-hidden"><div className="h-full bg-kblue rounded-full" style={{width:`${s.p}%`}}/></div></div>
              ))}
            </div>
          </div>
        </div>
        <div className="border-t border-kborder px-6 py-2 flex justify-between items-center bg-kgray-75 text-[10px] text-kgray-500">
          <span><span className="inline-flex items-center justify-center w-3.5 h-3.5 bg-gradient-to-br from-kgreen to-kgreen-hover rounded text-white text-[7px] font-bold mr-1">K</span> Powered by Keboola</span>
          <span>Region: {region} • Data refreshed 15 min ago</span>
        </div>
      </div>
    </div>
  );
}

// ─── App Shell ───

function App() {
  const [screen, setScreen] = useState('dashboard');
  const navigate = useCallback((s) => setScreen(s), []);

  const renderScreen = () => {
    switch (screen) {
      case 'dashboard': return <DashboardScreen onNavigate={navigate} />;
      case 'detail': return <DetailScreen onNavigate={navigate} />;
      case 'settings': return <SettingsScreen onNavigate={navigate} />;
      case 'deploy': return <DeployScreen />;
      case 'preview': return <SampleAppFull onNavigate={navigate} />;
      case 'create': return <CreateScreen onNavigate={navigate} />;
      case 'builder': return <BuilderScreen onNavigate={navigate} />;
      default: return <DashboardScreen onNavigate={navigate} />;
    }
  };

  return (
    <div className="flex h-screen">
      <KeboolaSidebar />
      <div className="flex-1 flex flex-col overflow-hidden">
        <KeboolaTopBar screen={screen} onNavigate={navigate} />
        <SecondaryNav screen={screen} onNavigate={navigate} />
        <div className="flex-1 overflow-y-auto bg-kbg">{renderScreen()}</div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
